<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Dashboard - Trading Bot</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .row{display:flex;gap:12px}
    .col{flex:1}
    .nav{margin-bottom:12px}
    .search{display:flex;gap:8px}
  </style>
</head>
<body>
  <div class="container">
    <div class="nav card">
      <button class="btn" onclick="location.href='/'">메인</button>
      <button class="btn" onclick="location.href='/decisions'">Decisions</button>
      <button class="btn" onclick="location.href='/account'">Account</button>
      <button class="btn" onclick="location.href='/account'">Orders</button>
      <button class="btn" onclick="location.href='/status'">Status</button>
    </div>

    <h1>메인 대시보드</h1>
    <div class="row">
      <div class="col card">
        <h3>BTC (KRW-BTC)</h3>
        <div id="chart-btc" style="height:320px"></div>
      </div>
      <div class="col card">
        <h3>ETH (KRW-ETH)</h3>
        <div id="chart-eth" style="height:320px"></div>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="search">
        <input id="symbol" placeholder="KRW-ATOM" />
        <button class="btn" id="btnSearch">조회</button>
      </div>
      <div id="chart-symbol" style="height:320px;margin-top:8px"></div>
    </div>
  </div>

  <script src="https://unpkg.com/lightweight-charts@3.7.0/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    function toUnixSeconds(ts){
      // if ts is numeric index, leave; if ISO string, convert
      if(!ts) return null
      if(typeof ts === 'number') return Math.floor(ts)
      const n = Date.parse(ts)
      if(!isNaN(n)) return Math.floor(n/1000)
      return null
    }

    function computeEMA(values, period){
      const k = 2/(period+1)
      let ema = []
      let prev = values[0]
      ema.push(prev)
      for(let i=1;i<values.length;i++){
        const v = values[i]
        prev = v * k + prev*(1-k)
        ema.push(prev)
      }
      return ema
    }

    async function loadLightweightChart(ticker, containerId, interval='minute60', count=200){
      try{
        const res = await fetch(`/api/price_ohlcv?ticker=${encodeURIComponent(ticker)}&interval=${encodeURIComponent(interval)}&count=${count}`)
        const jd = await res.json()
        const o = jd.ohlcv || []
        if(!o.length){
          const container = document.getElementById(containerId)
          container.innerHTML = '<div style="padding:18px;color:#666">데이터가 없습니다</div>'
          return
        }
        const candles = o.map(r=>({time: toUnixSeconds(r.ts), open: r.open, high: r.high, low: r.low, close: r.close}))
        const volumes = o.map(r=>({time: toUnixSeconds(r.ts), value: r.volume, color: r.close >= r.open ? 'rgba(0,150,136,0.6)' : 'rgba(255,82,82,0.6)'}))
        const container = document.getElementById(containerId)
        container.innerHTML = ''
        // formatter helpers
        const priceFormatter = v => new Intl.NumberFormat('ko-KR').format(v) + '₩'
        const timeFormatter = (timestamp) => {
          const d = new Date(timestamp*1000)
          return d.toLocaleString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit', hour:'2-digit', minute:'2-digit'})
        }
        const chart = LightweightCharts.createChart(container, {width: container.clientWidth, height: 320, layout:{background:'#ffffff', textColor:'#000'}, priceScale:{borderVisible:false, mode: 1}})
        const candleSeries = chart.addCandlestickSeries()
        candleSeries.setData(candles)
        // add volume as histogram (separate scale)
        const volumeSeries = chart.addHistogramSeries({priceScaleId: '', scaleMargins: {top: 0.8, bottom: 0}, color: '#26a69a'})
        volumeSeries.setData(volumes)
        // compute EMA(20)
        const closes = candles.map(c=>c.close)
        const ema = computeEMA(closes, 20)
        const emaData = candles.map((c,i)=>({time:c.time, value: ema[i]}))
        chart.addLineSeries({color:'#ff9800', lineWidth:1}).setData(emaData)
        // axis formatters
        chart.timeScale().applyOptions({timeVisible:true, rightOffset:2, fixLeftEdge:false})
        chart.applyOptions({
          localization: {dateFormat: 'yyyy-MM-dd'},
          layout:{},
        })
        // customize price axis labels
        const priceScale = chart.priceScale()
        // resize handling
        window.addEventListener('resize', ()=>{chart.applyOptions({width: container.clientWidth})})
      }catch(e){console.error(e); const container=document.getElementById(containerId); container.innerHTML='<div style="padding:18px;color:#c00">오류: '+e+'</div>'}
    }

    document.getElementById('btnSearch').addEventListener('click', ()=>{
      const s=document.getElementById('symbol').value.trim()
      if(s) loadLightweightChart(s, 'chart-symbol')
    })
    // initial with interval selector
    const defaultIntervals = ['minute1','minute3','minute5','minute15','minute60','day','week','month']
    function attachIntervalButtons(containerPrefix, chartIdPrefix, defaultTicker){
      const container = document.getElementById(containerPrefix)
      if(!container) return
      const btns = document.createElement('div')
      btns.style.marginBottom='8px'
      defaultIntervals.forEach(iv=>{
        const b=document.createElement('button')
        b.className='btn'
        b.style.marginRight='6px'
        b.textContent = iv.replace('minute','').replace('day','1D').replace('week','1W').replace('month','1M')
        b.onclick = ()=>{ loadLightweightChart(defaultTicker, chartIdPrefix, iv, iv.startsWith('minute')?200:400) }
        btns.appendChild(b)
      })
      container.parentNode.insertBefore(btns, container)
    }
    attachIntervalButtons('chart-btc','chart-btc','KRW-BTC')
    attachIntervalButtons('chart-eth','chart-eth','KRW-ETH')
    loadLightweightChart('KRW-BTC','chart-btc')
    loadLightweightChart('KRW-ETH','chart-eth')
  </script>
</body>
</html>
