# ============================================================================
# ⚠️  이 파일은 더미 값이 포함된 템플릿입니다.
#    실제 값을 채운 후 버전 관리에 커밋하지 마세요.
#    .gitignore 에 k8s/secret.yaml 을 추가하는 것을 강력히 권장합니다.
#
# 사용 전 base64 인코딩 방법:
#   echo -n "실제값" | base64
#
# 또는 kubectl로 직접 생성 (파일 없이):
#   kubectl create secret generic trading-bot-secret \
#     --from-literal=UPBIT_ACCESS_KEY=실제값 \
#     --from-literal=UPBIT_SECRET_KEY=실제값 \
#     --from-literal=TELEGRAM_BOT_TOKEN=실제값 \
#     --from-literal=TELEGRAM_CHAT_ID=실제값 \
#     --from-literal=TELEGRAM_ADMIN_USER_ID=실제값 \
#     -n quant-bot
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: trading-bot-secret
  namespace: quant-bot
  labels:
    app.kubernetes.io/name: trading-bot
type: Opaque
data:
  # 아래 값을 base64로 인코딩하여 교체하세요: echo -n "YOUR_VALUE" | base64

  # Upbit API 키
  UPBIT_ACCESS_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Upbit Secret 키
  UPBIT_SECRET_KEY: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Telegram 봇 토큰 (BotFather에서 발급)
  TELEGRAM_BOT_TOKEN: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Telegram 채팅방 ID (숫자)
  TELEGRAM_CHAT_ID: REPLACE_WITH_BASE64_ENCODED_VALUE

  # Telegram 관리자 user_id (숫자, 비어 있으면 CHAT_ID만 검증)
  TELEGRAM_ADMIN_USER_ID: REPLACE_WITH_BASE64_ENCODED_VALUE
