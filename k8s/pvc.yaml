apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: trading-bot-data
  namespace: quant-bot
  labels:
    app.kubernetes.io/name: trading-bot
spec:
  # ── ReadWriteOnce: 로그·pid·heartbeat 파일 보관용 ──────────────────────
  # DB는 PostgreSQL(postgres-statefulset.yaml의 별도 PVC)로 이관됨.
  # 이 PVC는 trading_bot/logs/ 디렉터리(로그·heartbeat.json·pid 등)를 위해 유지.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 로그 파일 전용 — SQLite DB 제거 후 1Gi면 충분.
      storage: 1Gi
  # ── StorageClass ────────────────────────────────────────────────────────
  # 주석 해제하여 클러스터에 맞는 StorageClass를 지정하세요:
  #
  # OrbStack (로컬):     storageClassName: standard
  # AWS EKS (gp3 SSD):  storageClassName: gp3
  # GKE:                storageClassName: standard-rwo
  # 기본값을 사용하려면 이 줄을 삭제하거나 주석 유지
  #
  # storageClassName: standard
