apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-bot
  namespace: quant-bot
  labels:
    app.kubernetes.io/name: trading-bot
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1  # 트레이딩 봇은 단일 인스턴스 유지 (중복 매수·매도 방지)

  # ── Recreate 전략 ──────────────────────────────────────────────────────
  # DB가 PostgreSQL로 이관되어 동시 쓰기 잠금 문제는 해소됨.
  # 그러나 단일 replicas=1 봇에서 두 인스턴스가 동시에 매매하면 중복 주문 위험이 있으므로
  # Recreate(구 파드 완전 종료 → 신 파드 기동) 전략을 유지.
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: trading-bot

  template:
    metadata:
      labels:
        app.kubernetes.io/name: trading-bot
        app.kubernetes.io/component: scheduler
    spec:
      # ── GHCR Private 이미지 인증 ──────────────────────────────────────────
      # 사전 생성 필요:
      #   kubectl create secret docker-registry ghcr-secret \
      #     --docker-server=ghcr.io \
      #     --docker-username=YOUR_GITHUB_USERNAME \
      #     --docker-password=YOUR_PAT_TOKEN \
      #     -n quant-bot
      imagePullSecrets:
        - name: ghcr-secret

      # ── 보안 컨텍스트 (파드 수준) ──────────────────────────────────────────
      securityContext:
        runAsNonRoot: true        # Dockerfile의 USER botuser 와 일치
        fsGroup: 1000             # PVC 볼륨 파일 소유권을 botuser 그룹으로 설정

      initContainers:
        # ── Init 1: PostgreSQL 준비 대기 ─────────────────────────────────
        # trading-bot이 DB에 연결 시도하기 전에 postgres 파드가 준비될 때까지 대기.
        # postgres:16-alpine 이미지의 pg_isready 를 사용.
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U $(POSTGRES_USER); do
                echo "PostgreSQL not ready yet, waiting..."
                sleep 3
              done
              echo "PostgreSQL is ready."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
          securityContext:
            runAsNonRoot: false
            runAsUser: 0

        # ── Init 2: logs 디렉터리 권한 초기화 ──────────────────────────
        # PVC가 처음 마운트될 때 소유권을 botuser(uid=999)로 설정.
        # 첫 배포 시 logs 디렉터리가 root 소유로 생성되어 봇이 쓰지 못하는 문제 예방.
        - name: init-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0           # 권한 변경을 위해 일시적으로 root 사용
            runAsNonRoot: false    # Pod-level runAsNonRoot: true 를 init에서만 명시적 오버라이드
          command:
            - sh
            - -c
            - |
              mkdir -p /app/trading_bot/logs
              chown -R 999:1000 /app/trading_bot/logs
              chmod 755 /app/trading_bot/logs
              echo "Init: logs directory permissions set."
          volumeMounts:
            - name: bot-data
              mountPath: /app/trading_bot/logs
              subPath: logs

      containers:
        - name: trading-bot
          # ── 이미지 ─────────────────────────────────────────────────────────
          # GitHub Actions CI/CD가 latest 태그를 자동 갱신함.
          image: ghcr.io/sambong90/trading_bot:latest

          # Always: CI/CD에서 latest를 계속 덮어쓰므로 항상 최신 이미지 pull
          imagePullPolicy: Always

          # ── 컨테이너 보안 컨텍스트 ─────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 999         # Dockerfile adduser --system 의 기본 uid
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # 로그·캐시 파일 쓰기를 위해 false
            capabilities:
              drop:
                - ALL

          # ── 환경 변수: ConfigMap (비민감 설정) ────────────────────────
          envFrom:
            - configMapRef:
                name: trading-bot-config

          # ── 환경 변수: Secret (민감 정보) ─────────────────────────────
          env:
            - name: UPBIT_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: UPBIT_ACCESS_KEY
            - name: UPBIT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: UPBIT_SECRET_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: TELEGRAM_CHAT_ID
            - name: TELEGRAM_ADMIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: TELEGRAM_ADMIN_USER_ID
            # DB_URL: 패스워드 포함 → Secret에서 주입 (ConfigMap 오버라이드)
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: DB_URL

          # ── 볼륨 마운트: 로그 전용 PVC ────────────────────────────────
          # DB는 PostgreSQL(별도 StatefulSet PVC)로 이관됨.
          # 이 PVC는 logs/ (heartbeat.json, pid, 로그파일) 전용.
          volumeMounts:
            - name: bot-data
              mountPath: /app/trading_bot/logs   # 로그·PID·heartbeat 파일
              subPath: logs

          # ── 리소스 요청/제한 ───────────────────────────────────────────────
          resources:
            requests:
              cpu: 200m        # 0.2 vCPU — 대기 중 idle 상태 기준
              memory: 512Mi    # pandas DataFrame + PostgreSQL 커넥션 풀 포함
            limits:
              cpu: 1000m       # 1 vCPU — 매매 사이클 피크 연산 시 burst 허용
              memory: 1Gi      # 60개 티커 동시 분석 시 최대 사용량

          # ── Liveness Probe: Heartbeat 파일 기반 생존 확인 ─────────────────
          # scheduler_service.py 가 5분마다 scheduler_heartbeat.json 을 갱신함.
          # 10분(600초) 이상 갱신이 없으면 스케줄러가 멈춘 것으로 판단 → 파드 재시작.
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import json, sys
                  from datetime import datetime
                  try:
                      d = json.load(open('/app/trading_bot/logs/scheduler_heartbeat.json'))
                      last = datetime.strptime(d['ts'], '%Y-%m-%d %H:%M:%S')
                      diff = (datetime.now() - last).total_seconds()
                      sys.exit(0 if diff < 600 else 1)
                  except Exception:
                      sys.exit(1)
            initialDelaySeconds: 60   # 스케줄러 기동 + 첫 heartbeat 쓰기 대기
            periodSeconds: 60         # 1분마다 체크
            timeoutSeconds: 10
            failureThreshold: 3       # 3회 연속 실패(=3분) 시 파드 재시작

          # ── Startup Probe: 최초 기동 시간 여유 확보 ──────────────────────
          # 의존성 로딩 + DB 테이블 생성 등 초기화에 최대 5분(30회×10초) 허용.
          startupProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import os, sys
                  sys.exit(0 if os.path.exists(
                      '/app/trading_bot/logs/scheduler_heartbeat.json') else 1)
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30      # 최대 5분 대기

      # ── 볼륨: PVC 연결 (로그 전용) ──────────────────────────────────────
      volumes:
        - name: bot-data
          persistentVolumeClaim:
            claimName: trading-bot-data

      # ── 종료 유예 시간 ────────────────────────────────────────────────────
      # scheduler_service.py 의 graceful_shutdown 이 15초 이내에 완료됨.
      terminationGracePeriodSeconds: 30
