apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-bot
  namespace: quant-bot
  labels:
    app.kubernetes.io/name: trading-bot
    app.kubernetes.io/component: scheduler
spec:
  replicas: 1  # SQLite를 사용하는 한 반드시 1로 유지. 2 이상이면 DB 잠금 손상 발생.

  # ── ⚠️ Recreate 전략: SQLite DB 보호의 핵심 ─────────────────────────────
  # RollingUpdate는 구 파드와 신 파드가 동시에 실행되는 순간이 존재함.
  # 두 파드가 같은 PVC(RWO) 위의 SQLite 파일에 동시 쓰기 시 "database is locked"
  # 오류 또는 DB 파일 손상이 발생할 수 있음.
  # Recreate: 구 파드를 완전히 종료(Terminated) → PVC 해제 → 신 파드 기동 순서 보장.
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: trading-bot

  template:
    metadata:
      labels:
        app.kubernetes.io/name: trading-bot
        app.kubernetes.io/component: scheduler
    spec:
      # ── GHCR Private 이미지 인증 ──────────────────────────────────────────
      # 사전 생성 필요:
      #   kubectl create secret docker-registry ghcr-secret \
      #     --docker-server=ghcr.io \
      #     --docker-username=YOUR_GITHUB_USERNAME \
      #     --docker-password=YOUR_PAT_TOKEN \
      #     -n quant-bot
      imagePullSecrets:
        - name: ghcr-secret

      # ── 보안 컨텍스트 (파드 수준) ──────────────────────────────────────────
      securityContext:
        runAsNonRoot: true        # Dockerfile의 USER botuser 와 일치
        fsGroup: 1000             # PVC 볼륨 파일 소유권을 botuser 그룹으로 설정
                                  # (DB·로그 파일에 쓰기 권한 보장)

      # ── Init Container: DB 디렉터리 권한 초기화 ───────────────────────────
      # PVC가 처음 마운트될 때 소유권을 botuser(uid=999)로 설정.
      # 첫 배포 시 DB 디렉터리가 root 소유로 생성되어 봇이 쓰지 못하는 문제 예방.
      initContainers:
        - name: init-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0           # 권한 변경을 위해 일시적으로 root 사용
          command:
            - sh
            - -c
            - |
              mkdir -p /app/trading_bot/db /app/trading_bot/logs
              chown -R 999:1000 /app/trading_bot/db /app/trading_bot/logs
              chmod 755 /app/trading_bot/db /app/trading_bot/logs
              echo "Init: DB/logs directory permissions set."
          volumeMounts:
            - name: bot-data
              mountPath: /app/trading_bot/db
              subPath: db
            - name: bot-data
              mountPath: /app/trading_bot/logs
              subPath: logs

      containers:
        - name: trading-bot
          # ── 이미지 ─────────────────────────────────────────────────────────
          # YOUR_GITHUB_USERNAME 을 실제 GitHub 계정명 또는 조직명으로 교체하세요.
          # GitHub Actions CI/CD가 latest 태그를 자동 갱신함.
          image: ghcr.io/YOUR_GITHUB_USERNAME/trading_bot:latest

          # Always: CI/CD에서 latest를 계속 덮어쓰므로 항상 최신 이미지 pull
          imagePullPolicy: Always

          # ── 컨테이너 보안 컨텍스트 ─────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 999         # Dockerfile adduser --system 의 기본 uid
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # 로그·캐시 파일 쓰기를 위해 false
            capabilities:
              drop:
                - ALL

          # ── 환경 변수: ConfigMap (비민감 설정) ────────────────────────────
          envFrom:
            - configMapRef:
                name: trading-bot-config

          # ── 환경 변수: Secret (민감 정보) ─────────────────────────────────
          env:
            - name: UPBIT_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: UPBIT_ACCESS_KEY
            - name: UPBIT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: UPBIT_SECRET_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: TELEGRAM_CHAT_ID
            - name: TELEGRAM_ADMIN_USER_ID
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: TELEGRAM_ADMIN_USER_ID

          # ── 볼륨 마운트: 단일 PVC, 두 개의 subPath ────────────────────────
          # db/ 와 logs/ 를 하나의 PVC 안에서 분리하여 관리.
          # subPath를 쓰면 PVC 루트를 오염시키지 않고 깔끔하게 격리됨.
          volumeMounts:
            - name: bot-data
              mountPath: /app/trading_bot/db     # SQLite DB 파일 위치
              subPath: db
            - name: bot-data
              mountPath: /app/trading_bot/logs   # 로그·PID·heartbeat 파일
              subPath: logs

          # ── 리소스 요청/제한 ───────────────────────────────────────────────
          # 60개 티커 분석 + pandas/numpy 연산 기준 실측값.
          # OrbStack 로컬: limits를 높게 설정해도 실제 사용량이 낮으면 문제없음.
          # 클라우드(t3.small 1vCPU/2GB 등): requests 를 노드 용량의 70% 이내로 유지.
          resources:
            requests:
              cpu: 200m        # 0.2 vCPU — 대기 중 idle 상태 기준
              memory: 512Mi    # pandas DataFrame + SQLite 캐시 포함
            limits:
              cpu: 1000m       # 1 vCPU — 매매 사이클 피크 연산 시 burst 허용
              memory: 1Gi      # 60개 티커 동시 분석 시 최대 사용량

          # ── Liveness Probe: Heartbeat 파일 기반 생존 확인 ─────────────────
          # scheduler_service.py 가 5분마다 scheduler_heartbeat.json 을 갱신함.
          # 10분(600초) 이상 갱신이 없으면 스케줄러가 멈춘 것으로 판단 → 파드 재시작.
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import json, sys
                  from datetime import datetime
                  try:
                      d = json.load(open('/app/trading_bot/logs/scheduler_heartbeat.json'))
                      last = datetime.strptime(d['ts'], '%Y-%m-%d %H:%M:%S')
                      diff = (datetime.now() - last).total_seconds()
                      sys.exit(0 if diff < 600 else 1)
                  except Exception:
                      sys.exit(1)
            initialDelaySeconds: 60   # 스케줄러 기동 + 첫 heartbeat 쓰기 대기
            periodSeconds: 60         # 1분마다 체크
            timeoutSeconds: 10
            failureThreshold: 3       # 3회 연속 실패(=3분) 시 파드 재시작

          # ── Startup Probe: 최초 기동 시간 여유 확보 ──────────────────────
          # 의존성 로딩 + DB 테이블 생성 등 초기화에 최대 5분(30회×10초) 허용.
          startupProbe:
            exec:
              command:
                - python3
                - -c
                - |
                  import os, sys
                  sys.exit(0 if os.path.exists(
                      '/app/trading_bot/logs/scheduler_heartbeat.json') else 1)
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30      # 최대 5분 대기

      # ── 볼륨: PVC 연결 ───────────────────────────────────────────────────
      volumes:
        - name: bot-data
          persistentVolumeClaim:
            claimName: trading-bot-data

      # ── 종료 유예 시간 ────────────────────────────────────────────────────
      # scheduler_service.py 의 graceful_shutdown 이 15초 이내에 완료됨.
      # 여유있게 30초로 설정 (기본값 30초와 동일하나 명시적으로 문서화).
      terminationGracePeriodSeconds: 30
