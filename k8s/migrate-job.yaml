# =============================================================================
# SQLite → PostgreSQL 데이터 마이그레이션 Job
#
# ── 실행 순서 ─────────────────────────────────────────────────────────────
# 1. trading-bot Deployment 중지 (기존 파드가 SQLite에 쓰는 것 방지):
#      kubectl scale deployment/trading-bot --replicas=0 -n quant-bot
#
# 2. PostgreSQL StatefulSet 기동 (아직 안 됐다면):
#      kubectl apply -f k8s/postgres-secret.yaml
#      kubectl apply -f k8s/postgres-service.yaml
#      kubectl apply -f k8s/postgres-statefulset.yaml
#      kubectl rollout status statefulset/postgres -n quant-bot
#
# 3. trading-bot-secret에 DB_URL 추가:
#      kubectl patch secret trading-bot-secret -n quant-bot \
#        --type='json' \
#        -p='[{"op":"add","path":"/data/DB_URL","value":"<base64_encoded_pg_url>"}]'
#
# 4. 이 Job 실행:
#      kubectl apply -f k8s/migrate-job.yaml
#      kubectl logs -f job/sqlite-to-postgres-migration -n quant-bot
#
# 5. 마이그레이션 완료 후 trading-bot 재기동:
#      kubectl apply -f k8s/deployment.yaml
#      kubectl rollout status deployment/trading-bot -n quant-bot
#
# 6. Job 정리 (선택):
#      kubectl delete job sqlite-to-postgres-migration -n quant-bot
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: sqlite-to-postgres-migration
  namespace: quant-bot
  labels:
    app.kubernetes.io/name: trading-bot
    app.kubernetes.io/component: migration
spec:
  # 실패 시 재시도 없음 (on_conflict_do_nothing으로 멱등하지만 실패 원인 파악 우선)
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400   # 완료 후 24시간 뒤 자동 삭제

  template:
    metadata:
      labels:
        app.kubernetes.io/name: trading-bot
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never

      # ── GHCR Private 이미지 인증 ────────────────────────────────────────
      imagePullSecrets:
        - name: ghcr-secret

      # ── 보안 컨텍스트 ────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000

      initContainers:
        # PostgreSQL이 준비될 때까지 대기
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U $(POSTGRES_USER); do
                echo "Waiting for PostgreSQL..."
                sleep 3
              done
              echo "PostgreSQL ready."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
          securityContext:
            runAsNonRoot: false
            runAsUser: 0

      containers:
        - name: migration
          # trading-bot 이미지를 그대로 사용 (SQLAlchemy 모델·드라이버 내장)
          image: ghcr.io/sambong90/trading_bot:latest
          imagePullPolicy: Always

          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

          command:
            - python3
            - scripts/migrate_sqlite_to_postgres.py

          env:
            # SQLite 파일 경로 (PVC 마운트 위치)
            - name: SQLITE_PATH
              value: /sqlite/trading_bot.db
            # PostgreSQL 연결 URL (Secret에서 주입)
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: trading-bot-secret
                  key: DB_URL

          volumeMounts:
            # 기존 SQLite PVC를 읽기 전용으로 마운트
            - name: sqlite-data
              mountPath: /sqlite
              subPath: db
              readOnly: true

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      volumes:
        # 기존 trading-bot-data PVC (SQLite DB가 저장된 볼륨)
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: trading-bot-data
